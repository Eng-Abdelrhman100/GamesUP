name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        if: hashFiles('server/package.json') != ''
        run: npm ci --prefix server

      - name: Build frontend
        run: npm run build

      - name: Build admin
        run: npm run build:admin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Pull latest code and install backend dependencies on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /var/www/gamesup
            git fetch origin main
            git reset --hard origin/main

            # Install server-side Node dependencies
            npm ci --omit=dev

      - name: Copy built frontend and admin assets via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/"
          target: "/var/www/gamesup"

      - name: Reload server and web services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /var/www/gamesup

            # Restart/reload Node Express server via PM2
            if pm2 describe gamesup-api >/dev/null 2>&1; then
              pm2 reload gamesup-api --update-env
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save

            # Test and reload Nginx
            nginx -t
            systemctl reload nginx
